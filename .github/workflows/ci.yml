# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Shauth integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Enforce bounded GitHub Actions jobs
        run: |
          ./scripts/test-workflow-timeouts.sh
          ./scripts/check-workflow-timeouts.sh
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: 1.13.5
      - run: go test ./...
      - name: Validate Terraform module
        run: |
          terraform -chdir=terraform fmt -check -recursive
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate
          terraform -chdir=terraform test
      - run: ./scripts/check-container-publication.sh
      - run: ./scripts/test-stack.sh

  validator-image:
    if: github.event_name == 'pull_request'
    name: Validator image ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            runner: ubuntu-24.04
          - architecture: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: docker build --file Dockerfile.validator --tag shauth-validator:pr .
      - name: Verify non-root Chromium runtime
        run: |
          test "$(docker image inspect shauth-validator:pr --format '{{.Config.User}}')" = node
          docker run --rm --entrypoint node shauth-validator:pr --input-type=module --eval \
            'import { chromium } from "playwright"; const browser = await chromium.launch({headless:true}); await browser.close();'

  build-amd64:
    if: github.event_name == 'push'
    name: Container amd64
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - id: sha
        run: echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/e6qu/shauth:${{ steps.sha.outputs.short_sha }}-amd64
          provenance: false
          sbom: false
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.validator
          push: true
          platforms: linux/amd64
          tags: ghcr.io/e6qu/shauth-validator:${{ steps.sha.outputs.short_sha }}-amd64
          provenance: false
          sbom: false

  build-arm64:
    if: github.event_name == 'push'
    name: Container arm64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - id: sha
        run: echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/e6qu/shauth:${{ steps.sha.outputs.short_sha }}-arm64
          provenance: false
          sbom: false
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.validator
          push: true
          platforms: linux/arm64
          tags: ghcr.io/e6qu/shauth-validator:${{ steps.sha.outputs.short_sha }}-arm64
          provenance: false
          sbom: false

  manifest:
    if: github.event_name == 'push'
    name: Container manifest
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - run: >-
          docker buildx imagetools create
          --tag ghcr.io/e6qu/shauth:${{ needs.build-amd64.outputs.short_sha }}
          ghcr.io/e6qu/shauth:${{ needs.build-amd64.outputs.short_sha }}-amd64
          ghcr.io/e6qu/shauth:${{ needs.build-arm64.outputs.short_sha }}-arm64
      - run: >-
          docker buildx imagetools create
          --tag ghcr.io/e6qu/shauth-validator:${{ needs.build-amd64.outputs.short_sha }}
          ghcr.io/e6qu/shauth-validator:${{ needs.build-amd64.outputs.short_sha }}-amd64
          ghcr.io/e6qu/shauth-validator:${{ needs.build-arm64.outputs.short_sha }}-arm64
      - name: Verify published OCI image shape
        run: >-
          ./scripts/verify-published-container.sh
          ghcr.io/e6qu/shauth
          ${{ needs.build-amd64.outputs.short_sha }}
      - name: Verify published validator OCI image shape
        run: >-
          ./scripts/verify-published-container.sh
          ghcr.io/e6qu/shauth-validator
          ${{ needs.build-amd64.outputs.short_sha }}

  prune:
    if: github.event_name == 'push'
    name: Retain 20 container releases
    needs: manifest
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Delete package versions outside the newest 20 releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/prune-ghcr-images.sh "${{ github.repository_owner }}" "${{ github.event.repository.name }}" 20
          ./scripts/prune-ghcr-images.sh "${{ github.repository_owner }}" "shauth-validator" 20
